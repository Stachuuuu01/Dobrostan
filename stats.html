<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Statystyk PRO - ZSTiO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #dc3545;
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --border: #232323;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #f0f0f0;
  --muted: #555;
  --inbox: #6060ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(220,53,69,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(220,53,69,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

/* Topbar */
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(8,8,8,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; }
.topbar-logo span { color: var(--primary); }
.topbar-badge { font-family: 'DM Mono', monospace; font-size: 0.7rem; background: rgba(220,53,69,0.1); color: var(--primary); border: 1px solid rgba(220,53,69,0.2); padding: 3px 8px; border-radius: 4px; }

/* Main Layout */
.main { position: relative; z-index: 1; padding: 32px; max-width: 1400px; margin: 0 auto; }
.kpi-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; }
.kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.kpi.total::before { background: #555; }
.kpi.good::before { background: var(--success); }
.kpi.bad::before { background: var(--warning); }
.kpi.fatal::before { background: var(--danger); }
.kpi-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.kpi-value { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; margin: 5px 0; }

.dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 20px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; display: flex; justify-content: space-between; }

/* Table Styles */
.votes-table-wrap { overflow-y: auto; max-height: 500px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th { padding: 12px 16px; text-align: left; font-family: 'DM Mono', monospace; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
tbody tr { border-bottom: 1px solid #151515; transition: 0.2s; }
tbody tr:hover { background: var(--surface2); }
td { padding: 12px 16px; }
.td-class { font-family: 'DM Mono', monospace; color: #5dade2; font-weight: 500; }
.td-code { font-family: 'DM Mono', monospace; background: #1a1a1a; padding: 3px 7px; border-radius: 5px; border: 1px solid #333; color: #888; font-size: 0.75rem; }
.mood-badge { padding: 4px 10px; border-radius: 99px; font-size: 0.7rem; font-family: 'DM Mono', monospace; text-transform: uppercase; }
.mood-badge.dobrze { background: rgba(34,197,94,0.1); color: var(--success); }
.mood-badge.zle { background: rgba(245,158,11,0.1); color: var(--warning); }
.mood-badge.fatalnie { background: rgba(239,68,68,0.1); color: var(--danger); }

/* Buttons & Inputs */
.filter-input { background: var(--surface2); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 8px; width: 100%; outline: none; margin: 10px 20px; width: calc(100% - 40px); }
.btn-send-msg { background: rgba(96,96,255,0.1); color: #a0a8ff; border: 1px solid rgba(96,96,255,0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.7rem; transition: 0.2s; }
.btn-send-msg:hover { background: rgba(96,96,255,0.25); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-overlay.show { display: flex; }
.msg-modal-box { background: var(--surface); border: 1px solid #333; border-radius: 20px; padding: 30px; width: 450px; position: relative; }
.msg-textarea { width: 100%; height: 120px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; padding: 15px; margin: 15px 0; outline: none; resize: none; }
.msg-send-btn { width: 100%; padding: 12px; background: #4444ff; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

/* Utils */
.fatal-alert-badge { background: rgba(239,68,68,0.2); color: #ff8888; border: 1px solid rgba(239,68,68,0.4); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-left: 5px; animation: blink 2s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><span>ZST</span>i<span>O</span> Jarosław</div>
  <div class="topbar-badge">ADMIN PANEL</div>
  <div>
    <button style="background:none; border:1px solid #333; color:#888; padding:5px 15px; border-radius:5px; cursor:pointer;" onclick="location.reload()">Odśwież</button>
  </div>
</div>

<div class="main">
  <div class="kpi-strip">
    <div class="kpi total"><div class="kpi-label">Wszystkie głosy</div><div class="kpi-value" id="kpi-total">0</div></div>
    <div class="kpi good"><div class="kpi-label">Dobrze 😊</div><div class="kpi-value" id="kpi-good">0</div></div>
    <div class="kpi bad"><div class="kpi-label">Źle 😐</div><div class="kpi-value" id="kpi-bad">0</div></div>
    <div class="kpi fatal"><div class="kpi-label">Fatalnie 😖</div><div class="kpi-value" id="kpi-fatal">0</div></div>
  </div>

  <div class="dashboard-grid">
    <div class="panel">
      <div class="panel-header">Wykres Nastrojów</div>
      <div style="padding:20px;"><canvas id="chart"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        Lista Odpowiedzi
        <span id="result-count" style="color:#555; font-size:0.7rem;">0 głosów</span>
      </div>
      <input class="filter-input" id="search-input" placeholder="Szukaj klasy, kodu lub powodu..." oninput="renderTable()">
      <div class="votes-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Klasa</th>
              <th>Kod Ucznia</th>
              <th>Nastrój</th>
              <th>Powód</th>
              <th>Data</th>
              <th>Akcja</th>
            </tr>
          </thead>
          <tbody id="votes-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-send-msg">
  <div class="msg-modal-box">
    <h3 style="font-family:Syne; margin-bottom:5px;">Wyślij Wsparcie</h3>
    <p id="msg-recipient-display" style="font-family:DM Mono; font-size:0.75rem; color:#666;"></p>
    
    <div style="margin-top:15px; display:flex; gap:5px; flex-wrap:wrap;">
        <button class="btn-send-msg" style="background:#222" onclick="setMsgText(0)">Szablon: Rozmowa</button>
        <button class="btn-send-msg" style="background:#222" onclick="setMsgText(1)">Szablon: Wsparcie</button>
    </div>

    <textarea class="msg-textarea" id="msg-text" placeholder="Wpisz treść wiadomości..."></textarea>
    
    <button class="msg-send-btn" id="send-btn-final" onclick="sendMessage()">Wyślij Prywatnie</button>
    <button style="width:100%; background:none; border:none; color:#444; margin-top:10px; cursor:pointer;" onclick="closeMsgModal()">Anuluj</button>
  </div>
</div>

<script>
let rawVotes = [];
let myChart = null;
let currentTarget = null;

const TEMPLATES = [
    "Cześć, zauważyłem Twoje zgłoszenie. Jeśli chcesz porozmawiać o tym, co się dzieje, zapraszam Cię do gabinetu pedagoga. Jesteśmy tu, żeby pomóc.",
    "Hej! Pamiętaj, że gorsze dni się zdarzają. Nie jesteś z tym sam. Jeśli potrzebujesz wsparcia, daj znać lub przyjdź na przerwę."
];

async function updateData() {
  try {
    const res = await fetch('/api/get_stats?details=true');
    const data = await res.json();
    rawVotes = data.raw_votes || [];
    
    // Update KPI
    document.getElementById('kpi-total').innerText = rawVotes.length;
    document.getElementById('kpi-good').innerText = rawVotes.filter(v => v.nastroj === 'dobrze').length;
    document.getElementById('kpi-bad').innerText = rawVotes.filter(v => v.nastroj === 'zle').length;
    document.getElementById('kpi-fatal').innerText = rawVotes.filter(v => v.nastroj === 'fatalnie').length;
    
    renderTable();
    updateChart();
  } catch (e) { console.error("Błąd pobierania danych:", e); }
}

function renderTable() {
  const tbody = document.getElementById('votes-tbody');
  const search = document.getElementById('search-input').value.toLowerCase();
  
  const filtered = rawVotes.filter(v => 
    (v.kto||'').toLowerCase().includes(search) || 
    (v.kod||'').toLowerCase().includes(search) || 
    (v.powod||'').toLowerCase().includes(search)
  );

  document.getElementById('result-count').innerText = filtered.length + " głosów";

  tbody.innerHTML = filtered.map(v => {
    const isFatal = v.nastroj === 'fatalnie';
    // Sprawdzanie serii (opcjonalne)
    const fatalStreak = rawVotes.filter(x => x.kto === v.kto && x.nastroj === 'fatalnie').length;
    const streakBadge = fatalStreak >= 2 ? `<span class="fatal-alert-badge">SERIA</span>` : '';

    return `
    <tr>
      <td><span class="td-class">${escapeHtml(v.kto)}</span>${streakBadge}</td>
      <td><span class="td-code">${escapeHtml(v.kod || '---')}</span></td>
      <td><span class="mood-badge ${v.nastroj}">${v.nastroj}</span></td>
      <td><span style="color:#aaa; font-size:0.8rem;">${escapeHtml(v.powod || 'brak powodu')}</span></td>
      <td><span style="color:#555; font-size:0.75rem; font-family:DM Mono;">${v.kiedy}</span></td>
      <td>
        ${isFatal ? `<button class="btn-send-msg" onclick='openMsgModal(${JSON.stringify(v.kto)}, ${JSON.stringify(v.kod)})'>✉ Wyślij</button>` : '—'}
      </td>
    </tr>`;
  }).join('');
}

function updateChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    const counts = [
        rawVotes.filter(v => v.nastroj === 'dobrze').length,
        rawVotes.filter(v => v.nastroj === 'zle').length,
        rawVotes.filter(v => v.nastroj === 'fatalnie').length
    ];

    if (myChart) {
        myChart.data.datasets[0].data = counts;
        myChart.update();
    } else {
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Dobrze', 'Źle', 'Fatalnie'],
                datasets: [{
                    data: counts,
                    backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                    borderWidth: 0,
                    cutout: '70%'
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }
}

function openMsgModal(kto, kod) {
    currentTarget = { kto, kod };
    document.getElementById('msg-recipient-display').innerText = `Adresat: Klasa ${kto} | Kod: ${kod}`;
    document.getElementById('modal-send-msg').classList.add('show');
}

function closeMsgModal() {
    document.getElementById('modal-send-msg').classList.remove('show');
}

function setMsgText(idx) {
    document.getElementById('msg-text').value = TEMPLATES[idx];
}

async function sendMessage() {
    const text = document.getElementById('msg-text').value.trim();
    if (!text || !currentTarget) return alert("Wpisz wiadomość!");

    const btn = document.getElementById('send-btn-final');
    btn.disabled = true;
    btn.innerText = "Wysyłanie...";

    try {
        const res = await fetch('/api/send_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                kod_odbiorcy: currentTarget.kod,
                tresc: text
            })
        });

        if (res.ok) {
            alert("Wysłano! Uczeń zobaczy tę wiadomość po wpisaniu swojego kodu.");
            closeMsgModal();
        } else {
            alert("Błąd serwera przy wysyłaniu.");
        }
    } catch (e) {
        alert("Błąd połączenia.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Wyślij Prywatnie";
    }
}

function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

updateData();
setInterval(updateData, 20000); // Auto odświeżanie co 20s
</script>
</body>
</html>
