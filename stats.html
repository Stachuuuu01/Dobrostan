<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Statystyk - ZSTiO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #dc3545; --success: #28a745; --warning: #ffc107; --dark-bg: #111; --card-bg: #222; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; }
        .btn-logout { background: #444; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .btn-logout:hover { background: var(--primary); }

        .stats-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; min-width: 140px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-5px); background: #2a2a2a; }
        .val { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { color: #888; font-size: 0.85rem; text-transform: uppercase; }
        
        #chart-container { position: relative; max-width: 450px; height: 350px; margin: 30px auto; }
        
        .controls { margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; }
        select, button { background: #333; color: white; padding: 10px 15px; border-radius: 8px; border: 1px solid #444; cursor: pointer; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 70vh; overflow-y: auto; border: 1px solid #444; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .history-item span { color: #888; }
        .close-btn { background: #555; border: none; color: white; padding: 10px; width: 100%; margin-top: 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-logout" onclick="location.href='/'">Wyloguj się</button>
    </div>

    <h1>📊 Statystyki Dobrostanu</h1>

    <div class="controls">
        <select id="filter" onchange="updateStats()">
            <option value="all">Wszystkie klasy</option>
        </select>
    </div>

    <div class="stats-grid">
        <div class="stat-card" onclick="showDetails('all')">
            <span class="label">Razem</span>
            <span id="total" class="val">0</span>
        </div>
        <div class="stat-card" onclick="showDetails('dobrze')" style="border-bottom: 4px solid var(--success);">
            <span class="label">Dobrze</span>
            <span id="p-dobrze" class="val">0%</span>
        </div>
        <div class="stat-card" onclick="showDetails('zle')" style="border-bottom: 4px solid var(--warning);">
            <span class="label">Źle</span>
            <span id="p-zle" class="val">0%</span>
        </div>
        <div class="stat-card" onclick="showDetails('fatalnie')" style="border-bottom: 4px solid var(--primary);">
            <span class="label">Fatalnie</span>
            <span id="p-fatalnie" class="val">0%</span>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Szczegóły</h3>
            <div id="historyList"></div>
            <button class="close-btn" onclick="closeModal()">Zamknij</button>
        </div>
    </div>

    <script>
        let myChart;
        let fullHistory = [];

        async function fetchClasses() {
            try {
                const res = await fetch('/api/get_stats?type=list');
                const classes = await res.json();
                const select = document.getElementById('filter');
                classes.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = c;
                    select.appendChild(opt);
                });
            } catch (e) { console.error("Błąd klas:", e); }
        }

        async function updateStats() {
            const filter = document.getElementById('filter').value;
            try {
                const res = await fetch(`/api/get_stats?filter=${filter}`);
                
                // Zabezpieczenie przed błędem "Unexpected token '<'"
                const contentType = res.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("Serwer nie zwrócił JSON. Sprawdź czy ścieżka /api/get_stats jest poprawnie podpięta w index.js.");
                }

                const data = await res.json();
                fullHistory = data.historia || []; 
                
                const d = data.dobrze || 0, z = data.zle || 0, f = data.fatalnie || 0;
                const total = d + z + f;
                document.getElementById('total').innerText = total;

                if (total > 0) {
                    document.getElementById('p-dobrze').innerText = Math.round((d/total)*100) + "%";
                    document.getElementById('p-zle').innerText = Math.round((z/total)*100) + "%";
                    document.getElementById('p-fatalnie').innerText = Math.round((f/total)*100) + "%";
                }
                renderChart(d, z, f);
            } catch (e) { console.error(e); }
        }

        function renderChart(d, z, f) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Dobrze', 'Źle', 'Fatalnie'],
                    datasets: [{
                        data: (d+z+f) > 0 ? [d, z, f] : [1],
                        backgroundColor: (d+z+f) > 0 ? ['#28a745', '#ffc107', '#dc3545'] : ['#333'],
                        borderWidth: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function showDetails(mood) {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            document.getElementById('modalTitle').innerText = "Głosy: " + mood.toUpperCase();

            const filtered = mood === 'all' ? fullHistory : fullHistory.filter(h => h.nastroj === mood);

            if (filtered.length === 0) {
                list.innerHTML = '<p style="color:gray">Brak danych.</p>';
            } else {
                filtered.slice().reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    // Mapowanie kolumn z Twojej bazy: kto, data_dodania
                    const date = item.data_dodania ? new Date(item.data_dodania).toLocaleString('pl-PL') : 'Brak daty';
                    div.innerHTML = `<strong>${item.kto}</strong> <span>${date}</span>`;
                    list.appendChild(div);
                });
            }
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }

        fetchClasses();
        updateStats();
        setInterval(updateStats, 15000);
    </script>
</body>
</html>
