<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Statystyk PRO - ZSTiO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #dc3545; --bg: #0d0d0d; --card-bg: #1a1a1a; --success: #28a745; --warning: #ffc107; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #111; border-bottom: 1px solid #333; }
        .btn-logout { background: transparent; border: 1px solid #555; color: #aaa; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        .content { padding: 20px; }
        .stats-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        
        .stat-card { 
            background: linear-gradient(145deg, #222, #1a1a1a); 
            padding: 25px; border-radius: 20px; min-width: 160px; border: 1px solid #333; 
            cursor: pointer; transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .val { font-size: 2.5rem; font-weight: 800; display: block; margin-top: 10px; }
        .label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
        
        #chart-container { max-width: 400px; margin: 30px auto; cursor: pointer; }

        /* MODAL / POPUP */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; /* Ukryty domyślnie */
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .modal-content { 
            background: #1a1a1a; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; 
            border: 1px solid #444; max-height: 70vh; overflow-y: auto; 
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        
        .detail-item { 
            display: flex; justify-content: space-between; padding: 12px; 
            border-bottom: 1px solid #222; font-size: 0.9rem; text-align: left;
        }
        .detail-item span:first-child { font-weight: bold; color: #5dade2; }
        .detail-item span:last-child { color: #777; font-family: monospace; }
        
        .close-btn { cursor: pointer; font-size: 1.5rem; color: #ff4444; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>ZSTiO Jarosław • Admin</span>
        <button class="btn-logout" onclick="location.href='/'">Wyloguj</button>
    </div>

    <div class="content">
        <h1>📊 Analiza Dobrostanu</h1>

        <div id="chart-container">
            <canvas id="chart"></canvas>
        </div>

        <div class="stats-grid">
            <div class="stat-card" onclick="showDetails('dobrze')">
                <span class="label">Dobrze</span>
                <span id="p-dobrze" class="val" style="color: var(--success);">0%</span>
            </div>
            <div class="stat-card" onclick="showDetails('zle')">
                <span class="label">Źle</span>
                <span id="p-zle" class="val" style="color: var(--warning);">0%</span>
            </div>
            <div class="stat-card" onclick="showDetails('fatalnie')">
                <span class="label">Fatalnie</span>
                <span id="p-fatalnie" class="val" style="color: var(--primary);">0%</span>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" style="margin:0">Szczegóły</h2>
                <span class="close-btn" onclick="closeModal()">✕</span>
            </div>
            <div id="modalList">
                </div>
        </div>
    </div>

    <script>
        let myChart;
        let rawVotes = []; // Tu będą dane z API

        async function updateData() {
            try {
                const res = await fetch('/api/get_stats?details=true');
                const data = await res.json();
                
                // Przypisujemy listę głosów (jeśli API ją wysyła)
                rawVotes = data.raw_votes || []; 
                
                const d = data.dobrze || 0;
                const z = data.zle || 0;
                const f = data.fatalnie || 0;
                const total = d + z + f;

                if(total > 0) {
                    document.getElementById('p-dobrze').innerText = Math.round((d/total)*100) + "%";
                    document.getElementById('p-zle').innerText = Math.round((z/total)*100) + "%";
                    document.getElementById('p-fatalnie').innerText = Math.round((f/total)*100) + "%";
                }
                
                drawChart(d, z, f);
            } catch (e) { console.log("Błąd pobierania:", e); }
        }

        function drawChart(d, z, f) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) {
                myChart.data.datasets[0].data = [d, z, f];
                myChart.update();
                return;
            }
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['dobrze', 'zle', 'fatalnie'],
                    datasets: [{
                        data: [d, z, f],
                        backgroundColor: ['#28a745', '#ffc107', '#dc3545'],
                        borderWidth: 0,
                        hoverOffset: 25
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if(el.length > 0) showDetails(myChart.data.labels[el[0].index]);
                    }
                }
            });
        }

        function showDetails(mood) {
            console.log("Otwieram detale dla:", mood); // Debug w konsoli
            const modal = document.getElementById('detailModal');
            const list = document.getElementById('modalList');
            document.getElementById('modalTitle').innerText = "Głosy: " + mood.toUpperCase();
            
            list.innerHTML = "";
            
            // Filtrowanie głosów
            const filtered = rawVotes.filter(v => v.nastroj === mood);

            if(filtered.length === 0) {
                list.innerHTML = "<p style='color:#666'>Brak szczegółowych danych w bazie dla tego nastroju.</p>";
            } else {
                filtered.forEach(v => {
                    const item = document.createElement('div');
                    item.className = 'detail-item';
                    item.innerHTML = `<span>Klasa: ${v.kto}</span><span>${v.kiedy || ''}</span>`;
                    list.appendChild(item);
                });
            }

            modal.style.display = "flex"; // POKAZUJEMY MODAL
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = "none";
        }

        // Zamykanie kliknięciem w tło
        window.onclick = (e) => { if(e.target.id === 'detailModal') closeModal(); }

        updateData();
    </script>
</body>
</html>
