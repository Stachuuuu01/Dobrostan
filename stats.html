<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Statystyk - ZSTiO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #dc3545; --success: #28a745; --warning: #ffc107; --dark-bg: #111; --card-bg: #222; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 20px; }
        .btn-logout { background: #444; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-logout:hover { background: var(--primary); border-color: var(--primary); }

        .stats-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 15px; min-width: 140px; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .stat-card:hover { transform: translateY(-5px); background: #2a2a2a; }
        .val { font-size: 2.2rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        
        #chart-container { position: relative; max-width: 500px; height: 400px; margin: 30px auto; }
        
        .controls { margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
        select, button { background: #333; color: white; padding: 12px 20px; border-radius: 8px; border: 1px solid #444; cursor: pointer; font-size: 1rem; }
        .btn-reset { background: var(--primary); font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #444; max-height: 80vh; overflow-y: auto; }
        .modal-header { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; font-size: 1.5rem; font-weight: bold; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 0.95rem; text-align: left; }
        .history-item span { color: #aaa; font-size: 0.85rem; }
        .close-btn { background: #444; margin-top: 20px; width: 100%; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { background: #555; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-logout" onclick="logout()">Wyloguj się</button>
    </div>

    <h1>📊 Panel Statystyk ZSTiO</h1>

    <div class="controls">
        <select id="filter" onchange="updateStats()">
            <option value="all">Cała szkoła</option>
        </select>
        <button class="btn-reset" onclick="resetStats()">Resetuj Dane</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card" onclick="showDetails('all')">
            <span class="label">Suma głosów</span>
            <span id="total" class="val">0</span>
        </div>
        <div class="stat-card" onclick="showDetails('dobrze')" style="border-bottom: 4px solid var(--success);">
            <span class="label">Dobrze</span>
            <span id="p-dobrze" class="val">0%</span>
        </div>
        <div class="stat-card" onclick="showDetails('zle')" style="border-bottom: 4px solid var(--warning);">
            <span class="label">Źle</span>
            <span id="p-zle" class="val">0%</span>
        </div>
        <div class="stat-card" onclick="showDetails('fatalnie')" style="border-bottom: 4px solid var(--primary);">
            <span class="label">Fatalnie</span>
            <span id="p-fatalnie" class="val">0%</span>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div id="modalTitle" class="modal-header">Szczegóły</div>
            <div id="historyList"></div>
            <button class="close-btn" onclick="closeModal()">Zamknij</button>
        </div>
    </div>

    <script>
        let myChart;
        let fullHistory = [];

        function logout() {
            if(confirm("Czy na pewno chcesz się wylogować?")) window.location.href = '/'; 
        }

        async function fetchClasses() {
            try {
                const res = await fetch('/api/get_stats?type=list');
                const classes = await res.json();
                const select = document.getElementById('filter');
                select.innerHTML = '<option value="all">Cała szkoła</option>';
                classes.forEach(c => {
                    if(c) {
                        const opt = document.createElement('option');
                        opt.value = c; opt.textContent = c; select.appendChild(opt);
                    }
                });
            } catch (e) { console.error("Błąd pobierania klas:", e); }
        }

        async function updateStats() {
            const filter = document.getElementById('filter').value;
            try {
                const res = await fetch(`/api/get_stats?filter=${filter}`);
                const data = await res.json();
                
                // Przypisujemy historię z serwera
                fullHistory = data.historia || []; 

                const d = data.dobrze || 0, z = data.zle || 0, f = data.fatalnie || 0;
                const total = d + z + f;
                document.getElementById('total').innerText = total;

                if (total > 0) {
                    document.getElementById('p-dobrze').innerText = Math.round((d/total)*100) + "%";
                    document.getElementById('p-zle').innerText = Math.round((z/total)*100) + "%";
                    document.getElementById('p-fatalnie').innerText = Math.round((f/total)*100) + "%";
                } else {
                    document.querySelectorAll('.val:not(#total)').forEach(el => el.innerText = "0%");
                }
                renderChart(d, z, f);
            } catch (e) { console.error("Błąd aktualizacji:", e); }
        }

        function renderChart(d, z, f) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            const hasData = (d + z + f) > 0;
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Dobrze', 'Źle', 'Fatalnie'],
                    datasets: [{
                        data: hasData ? [d, z, f] : [1],
                        backgroundColor: hasData ? ['#28a745', '#ffc107', '#dc3545'] : ['#333'],
                        borderWidth: 0, hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '70%',
                    onClick: (e, el) => { if(el.length > 0) showDetails(['dobrze','zle','fatalnie'][el[0].index]); },
                    plugins: { legend: { position: 'bottom', labels: { color: 'white' } } }
                }
            });
        }

        function showDetails(mood) {
            const modal = document.getElementById('detailsModal');
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            document.getElementById('modalTitle').innerText = "Głosy: " + mood.toUpperCase();

            // Filtrowanie po polu 'nastroj' (zgodnie z Twoją bazą)
            const filtered = mood === 'all' ? fullHistory : fullHistory.filter(h => h.nastroj === mood);

            if (filtered.length === 0) {
                list.innerHTML = `<p style="color:#888; padding: 20px;">Brak wpisów dla: ${mood}.</p>`;
            } else {
                // Mapujemy Twoje kolumny: 'kto' jako klasa, 'data_dodania' jako czas
                filtered.slice().reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<strong>${item.kto || 'Anonim'}</strong> <span>${item.data_dodania || ''}</span>`;
                    list.appendChild(div);
                });
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }

        async function resetStats() {
            const f = document.getElementById('filter').value;
            if (confirm("Czy na pewno chcesz zresetować te dane?")) {
                await fetch('/api/reset_stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filter: f })
                });
                updateStats();
            }
        }

        fetchClasses();
        updateStats();
        setInterval(updateStats, 10000); // Odświeżanie co 10 sekund
    </script>
</body>
</html>
