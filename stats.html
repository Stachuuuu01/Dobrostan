<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Statystyk - ZSTiO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #dc3545; --bg: #0d0d0d; --card-bg: #1a1a1a; --success: #28a745; --warning: #ffc107; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        /* Pasek nawigacji / góra */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: #111; border-bottom: 1px solid #333; margin-bottom: 30px; }
        .btn-logout { background: transparent; border: 1px solid #555; color: #aaa; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .stats-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
        .stat-card { background: linear-gradient(145deg, #222, #1a1a1a); padding: 25px; border-radius: 20px; min-width: 160px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: transform 0.3s, box-shadow 0.3s; }
        .stat-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(220, 53, 69, 0.2); }
        
        .val { font-size: 2.5rem; font-weight: 800; display: block; margin-top: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        
        #chart-container { max-width: 450px; margin: 40px auto; position: relative; }
        
        .controls { margin-bottom: 30px; display: flex; justify-content: center; gap: 15px; align-items: center; flex-wrap: wrap; }
        select, button { background: #222; color: white; padding: 12px 25px; border-radius: 12px; border: 1px solid #444; cursor: pointer; font-size: 1rem; transition: 0.3s; outline: none; }
        select:hover, button:hover { border-color: var(--primary); background: #2a2a2a; }
        
        .btn-reset { background: rgba(220, 53, 69, 0.1); color: var(--primary); border-color: var(--primary); font-weight: bold; }
        .btn-reset:hover { background: var(--primary) !important; color: white; }

        h1 { font-weight: 800; letter-spacing: -1px; margin: 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span>ZSTiO Jarosław • <strong>Admin Mode</strong></span>
        <button class="btn-logout" onclick="logout()">Wyloguj się</button>
    </div>

    <h1>📊 Statystyki Dobrostanu</h1>

    <div id="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div class="controls">
        <select id="filter" onchange="updateStats()">
            <option value="all">Cała szkoła</option>
        </select>
        <button class="btn-reset" onclick="resetStats()">Wyczyść dane</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="label">Wszystkie głosy</span>
            <span id="total" class="val">0</span>
        </div>
        <div class="stat-card" style="border-top: 5px solid var(--success);">
            <span class="label">Dobrze</span>
            <span id="p-dobrze" class="val" style="color: var(--success);">0%</span>
        </div>
        <div class="stat-card" style="border-top: 5px solid var(--warning);">
            <span class="label">Źle</span>
            <span id="p-zle" class="val" style="color: var(--warning);">0%</span>
        </div>
        <div class="stat-card" style="border-top: 5px solid var(--primary);">
            <span class="label">Fatalnie</span>
            <span id="p-fatalnie" class="val" style="color: var(--primary);">0%</span>
        </div>
    </div>

    <script>
        let myChart;

        function logout() {
            // Jeśli używasz prostego logowania opartego o sessionStorage/localStorage
            sessionStorage.clear();
            window.location.href = '/index.html'; // Przekierowanie do strony głównej
        }

        async function fetchClasses() {
            try {
                const res = await fetch('/api/get_stats?type=list');
                const classes = await res.json();
                const select = document.getElementById('filter');
                select.innerHTML = '<option value="all">Cała szkoła</option>';
                classes.forEach(className => {
                    if(className) {
                        const option = document.createElement('option');
                        option.value = className;
                        option.textContent = className;
                        select.appendChild(option);
                    }
                });
            } catch (e) { console.error("Błąd listy klas:", e); }
        }

        async function updateStats() {
            const filter = document.getElementById('filter').value;
            try {
                const res = await fetch(`/api/get_stats?filter=${filter}`);
                const data = await res.json();
                
                const d = data.dobrze || 0;
                const z = data.zle || 0;
                const f = data.fatalnie || 0;
                const total = d + z + f;

                document.getElementById('total').innerText = total;

                if (total > 0) {
                    document.getElementById('p-dobrze').innerText = Math.round((d / total) * 100) + "%";
                    document.getElementById('p-zle').innerText = Math.round((z / total) * 100) + "%";
                    document.getElementById('p-fatalnie').innerText = Math.round((f / total) * 100) + "%";
                } else {
                    document.getElementById('p-dobrze').innerText = "0%";
                    document.getElementById('p-zle').innerText = "0%";
                    document.getElementById('p-fatalnie').innerText = "0%";
                }

                renderChart(d, z, f);
            } catch (e) { console.error("Błąd danych:", e); }
        }

        function renderChart(d, z, f) {
            const ctx = document.getElementById('chart').getContext('2d');
            
            const hasData = (d + z + f) > 0;
            const chartData = hasData ? [d, z, f] : [1];
            const chartColors = hasData ? ['#28a745', '#ffc107', '#dc3545'] : ['#333'];

            if (myChart) {
                // Jeśli wykres istnieje, aktualizuj go płynnie zamiast niszczyć
                myChart.data.datasets[0].data = chartData;
                myChart.data.datasets[0].backgroundColor = chartColors;
                myChart.update();
            } else {
                myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Dobrze', 'Źle', 'Fatalnie'],
                        datasets: [{
                            data: chartData,
                            backgroundColor: chartColors,
                            borderWidth: 0,
                            hoverOffset: 20, // Powiększenie po najechaniu
                            borderRadius: 10, // Zaokrąglone końce
                            spacing: 5 // Przerwy między sekcjami
                        }]
                    },
                    options: { 
                        cutout: '75%',
                        responsive: true,
                        animation: {
                            animateScale: true,
                            animateRotate: true,
                            duration: 2000 // Dłuższa, płynniejsza animacja na start
                        },
                        plugins: { 
                            legend: { 
                                position: 'bottom', 
                                labels: { color: '#aaa', font: { size: 14, weight: 'bold' }, padding: 30 } 
                            },
                            tooltip: {
                                backgroundColor: '#222',
                                titleFont: { size: 16 },
                                bodyFont: { size: 14 },
                                padding: 15,
                                cornerRadius: 10,
                                displayColors: true
                            }
                        }
                    }
                });
            }
        }

        async function resetStats() {
            const filter = document.getElementById('filter').value;
            const scope = filter === 'all' ? "WSZYSTKIE dane" : `dane klasy ${filter}`;
            
            if (confirm(`⚠️ Czy na pewno chcesz wyczyścić ${scope}? Tej operacji nie da się cofnąć.`)) {
                try {
                    const res = await fetch('/api/reset_stats', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filter: filter })
                    });
                    if (res.ok) {
                        alert("Dane wyczyszczone.");
                        updateStats();
                    }
                } catch (e) { alert("Błąd połączenia."); }
            }
        }

        fetchClasses();
        updateStats();
        // Odświeżaj rzadziej, aby nie przerywać animacji (co 15s)
        setInterval(updateStats, 15000);
    </script>
</body>
</html>
